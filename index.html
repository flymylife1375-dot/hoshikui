<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>億り人への道</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;}
#c{display:block;touch-action:none;position:fixed;top:0;left:0;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#topbar{pointer-events:none;display:flex;align-items:center;gap:8px;padding:10px 12px;background:linear-gradient(rgba(0,0,0,.7),transparent);}
.chip{background:rgba(20,10,40,.85);border:2px solid #6a3fa0;border-radius:999px;padding:5px 14px;color:#fff;font-size:14px;font-weight:700;}
.chip span{color:#ffd54f;}
#depth-chip span{color:#80deea;}
#income-chip span{color:#a5d6a7;}
#btns{position:absolute;right:12px;bottom:160px;display:flex;flex-direction:column;gap:10px;pointer-events:all;}
.btn{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,.3);background:rgba(30,20,60,.85);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;text-align:center;line-height:1.2;}
.btn:active{transform:scale(.92);background:rgba(80,50,120,.9);}
#jump-btn{position:absolute;right:12px;bottom:80px;width:70px;height:70px;border-radius:50%;border:3px solid rgba(255,255,255,.4);background:rgba(40,20,80,.9);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;user-select:none;}
#jump-btn:active{transform:scale(.9);}
/* Panels */
.panel{position:absolute;left:50%;transform:translateX(-50%);background:rgba(15,10,30,.97);border:2px solid #5a3a8a;border-radius:16px;color:#fff;pointer-events:all;padding:16px;max-height:70vh;overflow-y:auto;}
#inv-panel{bottom:0;left:0;transform:none;width:100%;border-radius:16px 16px 0 0;max-height:55vh;display:none;}
#menu-panel{top:50%;left:50%;transform:translate(-50%,-50%);width:min(95vw,420px);display:none;}
#win-screen{top:50%;left:50%;transform:translate(-50%,-50%);width:min(90vw,380px);text-align:center;display:none;}
.panel h2{font-size:17px;margin-bottom:12px;color:#c9a0ff;text-align:center;}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,52px);gap:6px;}
.inv-slot{width:52px;height:52px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;cursor:pointer;position:relative;}
.inv-slot .ic{font-size:20px;line-height:1;}
.inv-slot .cnt{color:#ffd54f;font-size:11px;font-weight:700;}
.inv-slot .nm{font-size:9px;color:#ccc;text-align:center;line-height:1.2;margin-top:1px;}
.tabs{display:flex;gap:6px;margin-bottom:12px;}
.tab{flex:1;padding:8px 4px;background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#ccc;font-size:13px;font-weight:700;cursor:pointer;}
.tab.active{background:#6a3fa0;color:#fff;}
.recipe-list{display:flex;flex-direction:column;gap:8px;}
.recipe-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border-radius:10px;padding:10px;}
.recipe-info{flex:1;font-size:13px;}
.recipe-info .rl{font-weight:700;color:#fff;}
.recipe-info .rd{font-size:11px;color:#aaa;margin-top:2px;}
.recipe-btn{padding:8px 14px;border-radius:8px;border:none;background:#6a3fa0;color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.recipe-btn:disabled{background:#333;color:#666;}
.recipe-btn:not(:disabled):active{transform:scale(.95);}
.close-btn{display:block;width:100%;margin-top:12px;padding:10px;background:rgba(255,255,255,.1);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.close-btn:active{background:rgba(255,255,255,.2);}
/* Depth bar */
#depth-bar{position:absolute;right:0;top:0;width:12px;height:100%;background:rgba(0,0,0,.5);pointer-events:none;}
#depth-cursor{position:absolute;right:0;width:12px;height:20px;background:#ffd54f;border-radius:4px 0 0 4px;transition:top .3s;}
/* Notifications */
#notifs{position:absolute;top:70px;right:12px;display:flex;flex-direction:column;gap:4px;pointer-events:none;}
.notif{background:rgba(20,10,40,.9);border:1px solid #6a3fa0;border-radius:8px;padding:5px 10px;font-size:12px;color:#fff;animation:fadeOut 2s forwards;}
@keyframes fadeOut{0%{opacity:1;transform:translateY(0);}70%{opacity:1;}100%{opacity:0;transform:translateY(-20px);}}
/* Build indicator */
#build-indicator{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(60,200,100,.9);border-radius:8px;padding:6px 16px;font-size:13px;font-weight:700;color:#fff;display:none;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="topbar">
    <div class="chip" id="money-chip">💰 <span id="money-val">0</span>円</div>
    <div class="chip" id="depth-chip">⛏ 深さ<span id="depth-val">0</span>m</div>
    <div class="chip" id="income-chip">🏢 <span id="income-val">0</span>円/秒</div>
  </div>
  <div id="build-indicator">🧱 建設モード — タップで設置</div>
  <div id="depth-bar"><div id="depth-cursor"></div></div>
  <div id="btns">
    <div class="btn" id="btn-inv" onclick="togglePanel('inv')">🎒<br>持物</div>
    <div class="btn" id="btn-menu" onclick="togglePanel('menu')">🔨<br>作業</div>
    <div class="btn" id="btn-build" onclick="toggleBuildMode()">🏗<br>建設</div>
  </div>
  <div id="jump-btn">↑</div>
  <div id="notifs"></div>

  <!-- Inventory panel -->
  <div class="panel" id="inv-panel">
    <h2>🎒 所持品</h2>
    <div class="inv-grid" id="inv-grid"></div>
    <button class="close-btn" onclick="closePanel('inv')">閉じる</button>
  </div>

  <!-- Menu panel -->
  <div class="panel" id="menu-panel">
    <div class="tabs">
      <button class="tab active" onclick="showTab('sell')">売却</button>
      <button class="tab" onclick="showTab('craft')">クラフト</button>
      <button class="tab" onclick="showTab('smelt')">製錬</button>
    </div>
    <div id="tab-content"></div>
    <button class="close-btn" onclick="closePanel('menu')">閉じる</button>
  </div>

  <!-- Win screen -->
  <div class="panel" id="win-screen">
    <h2 style="font-size:28px;color:#ffd54f">🎉 億り人達成！</h2>
    <p style="margin:16px 0;font-size:16px;color:#ccc">1億円を達成しました！<br>あなたは億万長者です！</p>
    <div id="win-money" style="font-size:24px;font-weight:700;color:#ffd54f;margin:12px 0;"></div>
    <button class="close-btn" onclick="document.getElementById('win-screen').style.display='none'">続ける</button>
  </div>
</div>

<script>
'use strict';

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const TS = 40; // tile size px
const WW = 200, WH = 260; // world size (tiles)
const SURF = 38; // surface row

const T = {AIR:0,GRASS:1,DIRT:2,STONE:3,COAL:4,IRON:5,GOLD:6,DIAMOND:7,BRICK:8,BEDROCK:9,IRON_BLK:10,GOLD_BLK:11,CRYSTAL:12};

const TDEF = {
  [T.GRASS]  :{name:'草',       hp:15,  col:'#4a9e4a', top:'#2e7d32'},
  [T.DIRT]   :{name:'土',       hp:20,  col:'#8d6e63'},
  [T.STONE]  :{name:'石',       hp:80,  col:'#78909c'},
  [T.COAL]   :{name:'石炭鉱石', hp:100, col:'#607d8b', ore:'#263238', emoji:'⬛'},
  [T.IRON]   :{name:'鉄鉱石',   hp:130, col:'#78909c', ore:'#bf8970', emoji:'🟧'},
  [T.GOLD]   :{name:'金鉱石',   hp:160, col:'#78909c', ore:'#ffd54f', emoji:'🟨'},
  [T.DIAMOND]:{name:'ダイヤ鉱石',hp:200,col:'#546e7a', ore:'#80deea', emoji:'🟦'},
  [T.BRICK]  :{name:'レンガ',   hp:120, col:'#c62828', line:'#b71c1c'},
  [T.BEDROCK]:{name:'岩盤',     hp:1e9, col:'#212121'},
  [T.IRON_BLK]:{name:'鉄骨',   hp:150, col:'#90a4ae'},
  [T.GOLD_BLK]:{name:'金骨',   hp:150, col:'#ffc107'},
  [T.CRYSTAL]:{name:'クリスタル',hp:150,col:'#b2ebf2'},
};

const ITEMS = {
  dirt:        {name:'土',            col:'#8d6e63', emoji:'🟫', sell:5},
  stone:       {name:'石',            col:'#9e9e9e', emoji:'⬜', sell:10},
  coal_ore:    {name:'石炭鉱石',      col:'#546e7a', emoji:'⬛', sell:20},
  iron_ore:    {name:'鉄鉱石',        col:'#ff8a65', emoji:'🟧', sell:30},
  gold_ore:    {name:'金鉱石',        col:'#ffd54f', emoji:'🟨', sell:80},
  diamond_ore: {name:'ダイヤ鉱石',    col:'#80deea', emoji:'🟦', sell:300},
  coal:        {name:'石炭',          col:'#424242', emoji:'🔲', sell:50},
  iron_ingot:  {name:'鉄インゴット',  col:'#cfd8dc', emoji:'🔩', sell:250},
  gold_ingot:  {name:'金インゴット',  col:'#ffc107', emoji:'🥇', sell:1200},
  diamond:     {name:'ダイヤモンド',  col:'#80deea', emoji:'💎', sell:8000},
  brick:       {name:'レンガ',        col:'#c62828', emoji:'🧱', sell:15, place:T.BRICK},
  iron_frame:  {name:'鉄フレーム',    col:'#90a4ae', emoji:'🔧', sell:0,  place:T.IRON_BLK},
  gold_frame:  {name:'金フレーム',    col:'#ffc107', emoji:'✨', sell:0,  place:T.GOLD_BLK},
  crystal_tile:{name:'クリスタル床',  col:'#b2ebf2', emoji:'💠', sell:0,  place:T.CRYSTAL},
  stone_pick:  {name:'石ツルハシ',    col:'#9e9e9e', emoji:'⛏', sell:0,  pick:1},
  iron_pick:   {name:'鉄ツルハシ',    col:'#cfd8dc', emoji:'⛏', sell:0,  pick:2.5},
  gold_pick:   {name:'金ツルハシ',    col:'#ffc107', emoji:'⛏', sell:0,  pick:4},
  diamond_pick:{name:'ダイヤツルハシ',col:'#80deea', emoji:'⛏', sell:0,  pick:8},
};

const CRAFTS = [
  {id:'brick',        label:'レンガ ×2',       desc:'土 ×4',                   needs:{dirt:4},                  gives:{brick:2}},
  {id:'iron_frame',   label:'鉄フレーム ×1',   desc:'鉄インゴット ×3',         needs:{iron_ingot:3},            gives:{iron_frame:1}},
  {id:'gold_frame',   label:'金フレーム ×1',   desc:'金インゴット ×3',         needs:{gold_ingot:3},            gives:{gold_frame:1}},
  {id:'crystal_tile', label:'クリスタル床 ×1', desc:'ダイヤモンド ×2',         needs:{diamond:2},               gives:{crystal_tile:1}},
  {id:'stone_pick',   label:'石ツルハシ ×1',   desc:'石 ×4',                   needs:{stone:4},                 gives:{stone_pick:1}},
  {id:'iron_pick',    label:'鉄ツルハシ ×1',   desc:'鉄インゴット ×2 + 石 ×2',needs:{iron_ingot:2,stone:2},    gives:{iron_pick:1}},
  {id:'gold_pick',    label:'金ツルハシ ×1',   desc:'金インゴット ×2 + 石 ×2',needs:{gold_ingot:2,stone:2},    gives:{gold_pick:1}},
  {id:'diamond_pick', label:'ダイヤツルハシ ×1',desc:'ダイヤ ×1 + 石 ×2',    needs:{diamond:1,stone:2},        gives:{diamond_pick:1}},
];

const SMELTS = [
  {id:'coal',       label:'石炭 ×1',       desc:'石炭鉱石 ×1',           inp:'coal_ore',   out:'coal',       fuel:null,   fc:0},
  {id:'iron_ingot', label:'鉄インゴット',  desc:'鉄鉱石 ×1 + 石炭 ×1',  inp:'iron_ore',   out:'iron_ingot', fuel:'coal', fc:1},
  {id:'gold_ingot', label:'金インゴット',  desc:'金鉱石 ×1 + 石炭 ×1',  inp:'gold_ore',   out:'gold_ingot', fuel:'coal', fc:1},
  {id:'diamond',    label:'ダイヤモンド',  desc:'ダイヤ鉱石 ×1 + 石炭 ×2',inp:'diamond_ore',out:'diamond',  fuel:'coal', fc:2},
];

// Building income per floor type (yen/floor/sec base, multiplied by floor#)
const BLD_INCOME = {[T.BRICK]:10,[T.IRON_BLK]:60,[T.GOLD_BLK]:300,[T.CRYSTAL]:1500};

// ── WORLD ─────────────────────────────────────────────────────────────────────
let world = new Uint8Array(WW * WH);
let worldHP = new Float32Array(WW * WH);

function gt(x,y){if(x<0||x>=WW||y<0||y>=WH)return T.BEDROCK;return world[y*WW+x];}
function st(x,y,t){if(x<0||x>=WW||y<0||y>=WH)return;world[y*WW+x]=t;worldHP[y*WW+x]=TDEF[t]?TDEF[t].hp:0;}
function ghp(x,y){if(x<0||x>=WW||y<0||y>=WH)return 0;return worldHP[y*WW+x];}
function shp(x,y,v){if(x<0||x>=WW||y<0||y>=WH)return;worldHP[y*WW+x]=v;}

// Simple pseudo-random (seeded)
let _seed=12345;
function rng(){_seed=(_seed*1664525+1013904223)&0xffffffff;return((_seed>>>0)/0xffffffff);}

function genWorld(){
  world.fill(0);
  for(let x=0;x<WW;x++){
    const sv=Math.floor(Math.sin(x*0.31)*2+Math.cos(x*0.19)*3);
    const surf=SURF+sv;
    for(let y=0;y<WH;y++){
      let t=T.AIR;
      if(y===WH-1) t=T.BEDROCK;
      else if(y===surf) t=T.GRASS;
      else if(y>surf&&y<surf+8){
        t=T.DIRT;
        if(rng()<0.04)t=T.COAL;
      }else if(y>=surf+8){
        const d=y-surf;
        t=T.STONE;
        const r=rng();
        if(d<25){if(r<0.07)t=T.COAL;else if(r<0.09)t=T.IRON;}
        else if(d<55){if(r<0.04)t=T.COAL;else if(r<0.11)t=T.IRON;else if(r<0.13)t=T.GOLD;}
        else if(d<100){if(r<0.02)t=T.COAL;else if(r<0.08)t=T.IRON;else if(r<0.15)t=T.GOLD;else if(r<0.17)t=T.DIAMOND;}
        else{if(r<0.04)t=T.IRON;else if(r<0.11)t=T.GOLD;else if(r<0.20)t=T.DIAMOND;}
      }
      st(x,y,t);
    }
  }
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let money=0,totalIncome=0,gameWon=false;
let inv={};
let pickPow=0; // current pick power (0=bare hands)
let buildMode=false,buildTile=null;
let curTab='sell';

function addItem(id,n=1){inv[id]=(inv[id]||0)+n;updatePick();markInvDirty();}
function removeItem(id,n=1){inv[id]=Math.max(0,(inv[id]||0)-n);if(!inv[id])delete inv[id];updatePick();markInvDirty();}
function hasItem(id,n=1){return(inv[id]||0)>=n;}

function updatePick(){
  if(hasItem('diamond_pick'))pickPow=8;
  else if(hasItem('gold_pick'))pickPow=4;
  else if(hasItem('iron_pick'))pickPow=2.5;
  else if(hasItem('stone_pick'))pickPow=1;
  else pickPow=0;
}

function recalcIncome(){
  totalIncome=0;
  for(let x=0;x<WW;x++){
    let floor=0;
    for(let y=SURF-1;y>=0;y--){
      const t=gt(x,y);
      const inc=BLD_INCOME[t];
      if(!inc)break;
      floor++;
      totalIncome+=inc*floor;
    }
  }
}

// ── PLAYER ────────────────────────────────────────────────────────────────────
const P={
  x:(WW/2)*TS, y:(SURF-4)*TS,
  vx:0,vy:0, w:26,h:40,
  onGround:false, facingR:true,
  digTx:-1,digTy:-1, digProg:0,
  walkFrame:0, walkTimer:0,
};

function pTileX(){return Math.floor((P.x+P.w/2)/TS);}
function pTileY(){return Math.floor((P.y+P.h/2)/TS);}
function depthM(){return Math.max(0,Math.floor((pTileY()-SURF)*2));}

// ── CAMERA ───────────────────────────────────────────────────────────────────
let camX=0,camY=0;
function updateCam(cw,ch){
  const tx=P.x+P.w/2-cw/2, ty=P.y+P.h/2-ch/2;
  camX+=(tx-camX)*0.12; camY+=(ty-camY)*0.12;
  camX=Math.max(0,Math.min(WW*TS-cw,camX));
  camY=Math.max(0,Math.min(WH*TS-ch,camY));
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys={};
const joy={active:false,id:-1,ox:0,oy:0,dx:0,dy:0,R:65};
const jBtn={active:false,id:-1};

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();doJump();}
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

const canvas=document.getElementById('c');
canvas.addEventListener('touchstart',onTS,{passive:false});
canvas.addEventListener('touchmove',onTM,{passive:false});
canvas.addEventListener('touchend',onTE,{passive:false});
canvas.addEventListener('touchcancel',onTE,{passive:false});

function onTS(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const lx=t.clientX*dpr, ly=t.clientY*dpr;
    const cw=canvas.width;
    // Jump button area (right side, bottom)
    if(lx>cw*0.6&&ly>canvas.height*0.7){
      if(!jBtn.active){jBtn.active=true;jBtn.id=t.identifier;doJump();}
      continue;
    }
    // Build mode tap
    if(buildMode&&buildTile){
      const wx=lx+camX, wy=ly+camY;
      const tx=Math.floor(wx/TS), ty=Math.floor(wy/TS);
      tryPlace(tx,ty);
      continue;
    }
    // Joystick (left half)
    if(lx<cw*0.55&&!joy.active){
      joy.active=true;joy.id=t.identifier;
      joy.ox=lx;joy.oy=ly;joy.dx=0;joy.dy=0;
    }
  }
}
function onTM(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(joy.active&&t.identifier===joy.id){
      const lx=t.clientX*dpr, ly=t.clientY*dpr;
      let dx=lx-joy.ox, dy=ly-joy.oy;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>joy.R){const s=joy.R/d;dx*=s;dy*=s;}
      joy.dx=dx;joy.dy=dy;
    }
  }
}
function onTE(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(joy.active&&t.identifier===joy.id){joy.active=false;joy.dx=0;joy.dy=0;}
    if(jBtn.active&&t.identifier===jBtn.id)jBtn.active=false;
  }
}

document.getElementById('jump-btn').addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});

function doJump(){if(P.onGround){P.vy=-12;P.onGround=false;}}

// ── PHYSICS ───────────────────────────────────────────────────────────────────
function solid(x,y){const t=gt(x,y);return t!==T.AIR;}

function updatePhysics(){
  let mx=0,my=0;
  if(joy.active){mx=joy.dx/joy.R;my=joy.dy/joy.R;}
  if(keys['ArrowLeft']||keys['KeyA'])mx=-1;
  if(keys['ArrowRight']||keys['KeyD'])mx=1;
  if(keys['ArrowDown']||keys['KeyS'])my=1;
  if(mx!==0)P.facingR=mx>0;

  P.vx=mx*4.5;
  P.vy=Math.min(P.vy+0.55,16);

  // Move X
  P.x+=P.vx;
  const bx1=Math.floor(P.x/TS), bx2=Math.floor((P.x+P.w-1)/TS);
  const by1=Math.floor(P.y/TS), by2=Math.floor((P.y+P.h-2)/TS);
  if(P.vx>0&&(solid(bx2,by1)||solid(bx2,by2))){
    P.x=bx2*TS-P.w;P.vx=0;
    if(!buildMode)tryDigDir(bx2,by1,by2,'h');
  }
  if(P.vx<0&&(solid(bx1,by1)||solid(bx1,by2))){
    P.x=(bx1+1)*TS;P.vx=0;
    if(!buildMode)tryDigDir(bx1,by1,by2,'h');
  }

  // Move Y
  P.y+=P.vy;
  const ax1=Math.floor(P.x/TS), ax2=Math.floor((P.x+P.w-1)/TS);
  const ay1=Math.floor(P.y/TS), ay2=Math.floor((P.y+P.h-1)/TS);
  if(P.vy>0){
    if(solid(ax1,ay2)||solid(ax2,ay2)){
      P.y=ay2*TS-P.h;P.vy=0;P.onGround=true;
      // Dig down
      if(my>0.5&&!buildMode){tryDig(ax1,ay2+1);tryDig(ax2,ay2+1);}
    } else P.onGround=false;
  } else if(P.vy<0){
    if(solid(ax1,ay1)||solid(ax2,ay1)){P.y=(ay1+1)*TS;P.vy=0;}
    P.onGround=false;
  }

  P.x=Math.max(0,Math.min(WW*TS-P.w,P.x));
  if(P.y>WH*TS){P.y=(SURF-4)*TS;P.vy=0;}

  // Walk animation
  if(Math.abs(P.vx)>0.5&&P.onGround){
    P.walkTimer++;
    if(P.walkTimer>8){P.walkTimer=0;P.walkFrame=(P.walkFrame+1)%4;}
  } else P.walkFrame=0;
}

// ── MINING ────────────────────────────────────────────────────────────────────
const DIG_DPS=25;

function tryDigDir(tx,by1,by2,dir){
  // Pick the block with lower HP (prefer one being dug)
  if(gt(tx,by1)!==T.AIR&&gt(tx,by1)!==T.BEDROCK)tryDig(tx,by1);
  else if(gt(tx,by2)!==T.AIR&&gt(tx,by2)!==T.BEDROCK)tryDig(tx,by2);
}

function tryDig(tx,ty){
  if(tx<0||tx>=WW||ty<0||ty>=WH)return;
  const t=gt(tx,ty);
  if(t===T.AIR||t===T.BEDROCK)return;
  // Bare hands can't mine stone/ore
  if(pickPow===0&&t!==T.GRASS&&t!==T.DIRT)return;
  if(P.digTx!==tx||P.digTy!==ty){P.digTx=tx;P.digTy=ty;P.digProg=0;}
}

let lastTime=0;
function updateMining(dt){
  if(P.digTx<0)return;
  const t=gt(P.digTx,P.digTy);
  if(t===T.AIR){P.digTx=-1;P.digTy=-1;P.digProg=0;return;}
  const pow=pickPow||0.4;
  const dmg=DIG_DPS*pow*dt;
  const hp=ghp(P.digTx,P.digTy)-dmg;
  if(hp<=0){
    breakBlock(P.digTx,P.digTy);
    P.digTx=-1;P.digTy=-1;P.digProg=0;
  } else {
    shp(P.digTx,P.digTy,hp);
    P.digProg=1-hp/(TDEF[t]?.hp||1);
  }
}

function breakBlock(tx,ty){
  const t=gt(tx,ty);
  const drops={
    [T.GRASS]:'dirt',[T.DIRT]:'dirt',[T.STONE]:'stone',
    [T.COAL]:'coal_ore',[T.IRON]:'iron_ore',[T.GOLD]:'gold_ore',[T.DIAMOND]:'diamond_ore',
    [T.BRICK]:'brick',[T.IRON_BLK]:'iron_frame',[T.GOLD_BLK]:'gold_frame',[T.CRYSTAL]:'crystal_tile',
  };
  const drop=drops[t];
  if(drop){addItem(drop);showNotif('+1 '+ITEMS[drop].emoji+ITEMS[drop].name);}
  st(tx,ty,T.AIR);
  recalcIncome();
}

// ── PLACEMENT ─────────────────────────────────────────────────────────────────
function tryPlace(tx,ty){
  if(!buildTile)return;
  if(gt(tx,ty)!==T.AIR)return;
  // Must be above or at surface (no building underground)
  if(ty>=SURF)return;
  // Must have block below (ground or another building)
  const below=gt(tx,ty+1);
  if(below===T.AIR)return;
  // Must have item
  const key=Object.keys(ITEMS).find(k=>ITEMS[k].place===buildTile);
  if(!key||!hasItem(key)){showNotif('素材不足!');return;}
  removeItem(key);
  st(tx,ty,buildTile);
  recalcIncome();
  showNotif(ITEMS[key].emoji+' 設置！');
}

// ── SELL ──────────────────────────────────────────────────────────────────────
function sellAll(){
  let total=0;
  for(const [id,cnt] of Object.entries(inv)){
    const def=ITEMS[id];
    if(def&&def.sell>0){total+=def.sell*cnt;delete inv[id];}
  }
  if(total===0){showNotif('売れるものがないよ');return;}
  money+=total;
  markInvDirty();
  showNotif('💰 +'+(total).toLocaleString()+'円 売却！');
  checkWin();
}

// ── BUILD MODE ────────────────────────────────────────────────────────────────
function toggleBuildMode(){
  buildMode=!buildMode;
  if(!buildMode){buildTile=null;document.getElementById('build-indicator').style.display='none';return;}
  // Show build item picker
  const placeItems=Object.entries(ITEMS).filter(([k,v])=>v.place&&(inv[k]||0)>0);
  if(!placeItems.length){showNotif('建設素材なし（レンガ等を作ろう）');buildMode=false;return;}
  // Auto-select first available
  buildTile=placeItems[0][1].place;
  document.getElementById('build-indicator').style.display='block';
  document.getElementById('build-indicator').textContent='🏗 建設モード: '+placeItems[0][1].emoji+placeItems[0][1].name+' — タップで設置 (もう一度でOFF)';
}

// ── UI ────────────────────────────────────────────────────────────────────────
let invDirty=false,menuOpen=false,invOpen=false;
function markInvDirty(){invDirty=true;}

function refreshInventoryUI(){
  if(!invDirty&&!invOpen)return;
  invDirty=false;
  const grid=document.getElementById('inv-grid');
  grid.innerHTML='';
  const entries=Object.entries(inv).filter(([k,v])=>v>0&&ITEMS[k]);
  if(!entries.length){grid.innerHTML='<div style="color:#888;font-size:13px;padding:8px">空っぽ</div>';return;}
  for(const [id,cnt] of entries){
    const def=ITEMS[id];
    const el=document.createElement('div');
    el.className='inv-slot';
    el.innerHTML=`<div class="ic">${def.emoji}</div><div class="cnt">${cnt}</div><div class="nm">${def.name}</div>`;
    grid.appendChild(el);
  }
}

function togglePanel(p){
  if(p==='inv'){
    invOpen=!invOpen;
    document.getElementById('inv-panel').style.display=invOpen?'block':'none';
    if(invOpen){refreshInventoryUI();document.getElementById('menu-panel').style.display='none';menuOpen=false;}
  } else {
    menuOpen=!menuOpen;
    document.getElementById('menu-panel').style.display=menuOpen?'block':'none';
    if(menuOpen){renderMenuTab(curTab);document.getElementById('inv-panel').style.display='none';invOpen=false;}
  }
}

function closePanel(p){
  if(p==='inv'){invOpen=false;document.getElementById('inv-panel').style.display='none';}
  else{menuOpen=false;document.getElementById('menu-panel').style.display='none';}
}

function showTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.textContent.includes({sell:'売',craft:'クラ',smelt:'製'}[t]||t)));
  renderMenuTab(t);
}

function renderMenuTab(t){
  const el=document.getElementById('tab-content');
  if(t==='sell'){
    let html='<div style="margin-bottom:10px;font-size:13px;color:#aaa">資源を売って収益を得よう！</div>';
    let hasSell=false;
    for(const [id,cnt] of Object.entries(inv)){
      const d=ITEMS[id];if(!d||!d.sell)continue;
      hasSell=true;
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08)">
        <span style="font-size:18px">${d.emoji}</span>
        <span style="flex:1;font-size:13px">${d.name} ×${cnt}</span>
        <span style="color:#ffd54f;font-size:13px">${(d.sell*cnt).toLocaleString()}円</span>
      </div>`;
    }
    if(!hasSell)html+='<div style="color:#888;font-size:13px">売れるものなし</div>';
    html+=`<button onclick="sellAll()" style="margin-top:12px;width:100%;padding:12px;background:#f57f17;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;cursor:pointer">全部売る 💰</button>`;
    el.innerHTML=html;
  } else if(t==='craft'){
    el.innerHTML='<div class="recipe-list">'+CRAFTS.map(r=>{
      const can=Object.entries(r.needs).every(([k,v])=>hasItem(k,v));
      return `<div class="recipe-row">
        <div class="recipe-info"><div class="rl">${r.label}</div><div class="rd">${r.desc}</div></div>
        <button class="recipe-btn" ${can?'':'disabled'} onclick="doCraft('${r.id}')">${can?'作る':'素材不足'}</button>
      </div>`;
    }).join('')+'</div>';
  } else {
    el.innerHTML='<div class="recipe-list">'+SMELTS.map(r=>{
      const hasInp=hasItem(r.inp);
      const hasFuel=!r.fuel||hasItem(r.fuel,r.fc||1);
      const can=hasInp&&hasFuel;
      return `<div class="recipe-row">
        <div class="recipe-info"><div class="rl">${r.label}</div><div class="rd">${r.desc}</div></div>
        <button class="recipe-btn" ${can?'':'disabled'} onclick="doSmelt('${r.id}')">${can?'製錬':'素材不足'}</button>
      </div>`;
    }).join('')+'</div>';
  }
}

function doCraft(id){
  const r=CRAFTS.find(x=>x.id===id);if(!r)return;
  if(!Object.entries(r.needs).every(([k,v])=>hasItem(k,v))){showNotif('素材不足');return;}
  Object.entries(r.needs).forEach(([k,v])=>removeItem(k,v));
  Object.entries(r.gives).forEach(([k,v])=>addItem(k,v));
  showNotif('✅ '+r.label+' 作成！');
  renderMenuTab('craft');
}

function doSmelt(id){
  const r=SMELTS.find(x=>x.id===id);if(!r)return;
  if(!hasItem(r.inp)){showNotif('素材不足');return;}
  if(r.fuel&&!hasItem(r.fuel,r.fc||1)){showNotif('石炭不足');return;}
  removeItem(r.inp);
  if(r.fuel)removeItem(r.fuel,r.fc||1);
  addItem(r.out);
  showNotif('🔥 '+r.label+' 製錬！');
  renderMenuTab('smelt');
}

let notifTimer=null;
function showNotif(msg){
  const el=document.createElement('div');
  el.className='notif';el.textContent=msg;
  document.getElementById('notifs').appendChild(el);
  setTimeout(()=>el.remove(),2100);
}

function checkWin(){
  if(!gameWon&&money>=100000000){
    gameWon=true;
    document.getElementById('win-screen').style.display='block';
    document.getElementById('win-money').textContent='💰 '+money.toLocaleString()+'円 達成！';
  }
}

// ── RENDERING ─────────────────────────────────────────────────────────────────
let dpr=1;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=window.innerWidth*dpr;
  canvas.height=window.innerHeight*dpr;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
}
window.addEventListener('resize',resize);resize();

const ctx=canvas.getContext('2d');

function drawTile(ctx,t,sx,sy,prog){
  const def=TDEF[t];if(!def)return;
  ctx.fillStyle=def.col;
  ctx.fillRect(sx,sy,TS,TS);
  // Ore veins
  if(def.ore){
    ctx.fillStyle=def.ore;
    // Draw 3 ore spots
    const dots=[{x:.25,y:.25,r:5},{x:.6,y:.55,r:6},{x:.35,y:.65,r:4}];
    for(const d of dots){
      ctx.beginPath();ctx.ellipse(sx+TS*d.x,sy+TS*d.y,d.r,d.r*0.7,0.4,0,Math.PI*2);ctx.fill();
    }
  }
  // Brick pattern
  if(t===T.BRICK){
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;
    ctx.strokeRect(sx+2,sy+2,TS-4,TS/2-2);
    ctx.strokeRect(sx+TS/4,sy+TS/2+1,TS/2,TS/2-3);
    ctx.strokeRect(sx+TS/2+1,sy+TS/2+1,TS/2-3,TS/2-3);
  }
  if(t===T.IRON_BLK){
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(sx+4,sy);ctx.lineTo(sx+4,sy+TS);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+TS-4,sy);ctx.lineTo(sx+TS-4,sy+TS);ctx.stroke();
  }
  // Grass top
  if(t===T.GRASS){ctx.fillStyle=def.top||'#2e7d32';ctx.fillRect(sx,sy,TS,6);}
  // Dig progress
  if(prog>0){
    ctx.fillStyle=`rgba(0,0,0,${prog*0.6})`;ctx.fillRect(sx,sy,TS,TS);
    const cracks=[2,0.5,0.3];
    ctx.strokeStyle='rgba(0,0,0,0.7)';
    for(let i=0;i<Math.floor(prog*3)+1;i++){
      const lw=cracks[i]||0.3;ctx.lineWidth=lw;
      ctx.beginPath();ctx.moveTo(sx+TS/2,sy+TS/2);ctx.lineTo(sx+(i%2===0?10:TS-10),sy+(i<2?8:TS-8));ctx.stroke();
    }
  }
  // Border
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=0.5;ctx.strokeRect(sx,sy,TS,TS);
}

function drawPlayer(ctx,sx,sy){
  const flip=!P.facingR;
  ctx.save();
  if(flip){ctx.translate(sx+P.w,sy);ctx.scale(-1,1);}else ctx.translate(sx,sy);

  // Body
  ctx.fillStyle='#5c6bc0';ctx.fillRect(4,14,18,20);
  // Legs (animate)
  const legO=P.onGround?Math.sin(P.walkFrame/4*Math.PI)*5:0;
  ctx.fillStyle='#3949ab';
  ctx.fillRect(4,34,8,8+Math.max(0,legO));
  ctx.fillRect(12,34,8,8-Math.min(0,legO)+Math.max(0,-legO));
  // Arms
  const armA=P.onGround?Math.sin(P.walkFrame/4*Math.PI+Math.PI)*8:0;
  ctx.fillStyle='#7986cb';
  ctx.fillRect(0,14,4,14+armA);
  ctx.fillRect(22,14,4,14-armA);
  // Head
  ctx.fillStyle='#ffb74d';ctx.fillRect(3,2,20,14);
  // Eyes
  ctx.fillStyle='#333';ctx.fillRect(16,6,3,3);
  // Hair
  ctx.fillStyle='#5d4037';ctx.fillRect(3,2,20,4);
  // Pick
  if(pickPow>0){
    ctx.fillStyle=pickPow>=8?'#b2ebf2':pickPow>=4?'#ffc107':pickPow>=2.5?'#bdbdbd':'#9e9e9e';
    ctx.fillRect(22,10,8,3);ctx.fillRect(26,6,3,8);
  }
  ctx.restore();
}

function render(){
  const cw=canvas.width,ch=canvas.height;
  ctx.clearRect(0,0,cw,ch);

  // Sky / underground background
  const surfPx=SURF*TS-camY;
  if(surfPx>0){
    const skyGrad=ctx.createLinearGradient(0,0,0,Math.min(surfPx,ch));
    skyGrad.addColorStop(0,'#90caf9');skyGrad.addColorStop(1,'#e3f2fd');
    ctx.fillStyle=skyGrad;ctx.fillRect(0,0,cw,Math.min(surfPx,ch));
  }
  if(surfPx<ch){
    const ugGrad=ctx.createLinearGradient(0,surfPx,0,ch);
    const d=pTileY()-SURF;
    const dark=Math.min(0.85,d/120);
    ugGrad.addColorStop(0,`rgb(${80-d*0.3|0},${55-d*0.2|0},${40-d*0.15|0})`);
    ugGrad.addColorStop(1,`rgb(${Math.max(10,30-d*0.2)|0},${Math.max(5,20-d*0.15)|0},${Math.max(5,15-d*0.1)|0})`);
    ctx.fillStyle=ugGrad;ctx.fillRect(0,Math.max(0,surfPx),cw,ch);
  }

  // Tiles
  const tx0=Math.max(0,Math.floor(camX/TS));
  const ty0=Math.max(0,Math.floor(camY/TS));
  const tx1=Math.min(WW,tx0+Math.ceil(cw/TS)+2);
  const ty1=Math.min(WH,ty0+Math.ceil(ch/TS)+2);

  for(let ty=ty0;ty<ty1;ty++){
    for(let tx=tx0;tx<tx1;tx++){
      const t=gt(tx,ty);
      if(t===T.AIR)continue;
      const sx=tx*TS-camX, sy=ty*TS-camY;
      const isDig=P.digTx===tx&&P.digTy===ty;
      drawTile(ctx,t,sx,sy,isDig?P.digProg:0);
    }
  }

  // Player
  const psx=P.x-camX, psy=P.y-camY;
  drawPlayer(ctx,psx,psy);

  // Dig target indicator
  if(P.digTx>=0){
    const sx=P.digTx*TS-camX,sy=P.digTy*TS-camY;
    ctx.strokeStyle='rgba(255,255,0,0.7)';ctx.lineWidth=2;
    ctx.strokeRect(sx+1,sy+1,TS-2,TS-2);
    // Progress bar
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(sx,sy+TS-6,TS,6);
    ctx.fillStyle='#ffd54f';ctx.fillRect(sx,sy+TS-6,TS*P.digProg,6);
  }

  // Joystick
  if(joy.active){
    ctx.save();ctx.globalAlpha=0.55;
    ctx.strokeStyle='#fff';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(joy.ox,joy.oy,joy.R,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();
    const ix=joy.ox+joy.dx,iy=joy.oy+joy.dy;
    ctx.fillStyle='rgba(255,255,255,.8)';
    ctx.beginPath();ctx.arc(ix,iy,joy.R*0.38,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

// ── HUD UPDATE ────────────────────────────────────────────────────────────────
let hudTimer=0;
function updateHUD(dt){
  hudTimer+=dt;
  // Passive income
  if(totalIncome>0){
    money+=totalIncome*dt;
    checkWin();
  }
  if(hudTimer>0.1){
    hudTimer=0;
    document.getElementById('money-val').textContent=Math.floor(money).toLocaleString();
    document.getElementById('depth-val').textContent=depthM();
    document.getElementById('income-val').textContent=Math.floor(totalIncome).toLocaleString();
    // Depth cursor
    const pct=Math.min(1,pTileY()/WH);
    document.getElementById('depth-cursor').style.top=(pct*100)+'%';
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-(lastTime||ts))/1000,0.05);
  lastTime=ts;
  if(invOpen||menuOpen)return render(); // pause physics while menu open
  updatePhysics();
  updateMining(dt);
  updateCam(canvas.width,canvas.height);
  updateHUD(dt);
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
genWorld();
// Give starter items
addItem('stone_pick');
addItem('dirt',10);
recalcIncome();
requestAnimationFrame(loop);
</script>
